{% extends "base.html" %}

{% block content %}
<div class="container fade-in">
    <div class="page-header fade-in-up">
        <h1 class="text-gradient">➕ Add New Route</h1>
        <a href="{{ url_for('admin') }}" class="btn btn-sm btn-outline underline-animate fade-in-up delay-200">← Back to Admin</a>
    </div>

    <div class="form-container fade-in-up delay-300">
        <form method="POST" class="admin-form glass glass-dark stagger-children">
            <div class="form-section glass lift-on-hover fade-in-up delay-100">
                <h3 class="text-gradient">🛣️ Route Information</h3>

                <div class="form-row">
                    <div class="form-group fade-in-up delay-100">
                        <label for="source">Source City <span class="text-danger">*</span></label>
                        <input type="text" id="source" name="source" placeholder="e.g., New York" class="form-control" required list="cities">
                    </div>
                    <div class="form-group fade-in-up delay-200">
                        <label for="destination">Destination City <span class="text-danger">*</span></label>
                        <input type="text" id="destination" name="destination" placeholder="e.g., Los Angeles" class="form-control" required list="cities">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group fade-in-up delay-300">
                        <label for="transport_type">Transport Type <span class="text-danger">*</span></label>
                        <select id="transport_type" name="transport_type" class="form-control" required>
                            <option value="">Select Transport Type</option>
                            <option value="Flight">✈️ Flight</option>
                            <option value="Bus">🚌 Bus</option>
                            <option value="Train">🚂 Train</option>
                        </select>
                    </div>
                    <div class="form-group fade-in-up delay-400">
                        <label for="price">Price (₹) <span class="text-danger">*</span></label>
                        <input type="number" id="price" name="price" placeholder="e.g., 299.99" class="form-control" min="0" step="0.01" required>
                    </div>
                </div>
            </div>

            <div class="form-section glass lift-on-hover fade-in-up delay-200">
                <h3 class="text-gradient">⏰ Timing</h3>

                <div class="form-row">
                    <div class="form-group fade-in-up delay-100">
                        <label for="departure_time">Departure Date & Time <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="departure_time" name="departure_time" class="form-control" required>
                    </div>
                    <div class="form-group fade-in-up delay-200">
                        <label for="arrival_time">Arrival Date & Time <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="arrival_time" name="arrival_time" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="form-section glass lift-on-hover fade-in-up delay-300">
                <h3 class="text-gradient">👥 Capacity</h3>

                <div class="form-row">
                    <div class="form-group fade-in-up delay-100">
                        <label for="total_seats">Total Seats <span class="text-danger">*</span></label>
                        <input type="number" id="total_seats" name="total_seats" placeholder="e.g., 180" class="form-control" min="1" required>
                    </div>
                </div>
            </div>

            <div class="form-section glass lift-on-hover fade-in-up delay-400">
                <h3 class="text-gradient">🎁 Additional Information</h3>

                <div class="form-row">
                    <div class="form-group full-width fade-in-up delay-100">
                        <label for="amenities">Amenities</label>
                        <textarea id="amenities" name="amenities" placeholder="e.g., WiFi, Food Service, Entertainment System" class="form-control" rows="3"></textarea>
                        <small>Separate multiple amenities with commas</small>
                    </div>
                </div>
            </div>

            <div class="form-section stagger-children fade-in-up delay-500">
                <button type="submit" class="btn btn-primary btn-large btn-glow fade-in-up delay-100">Add Route</button>
                <a href="{{ url_for('admin') }}" class="btn btn-outline btn-large underline-animate fade-in-up delay-200">Cancel</a>
            </div>
        </form>
    </div>
</div>

<datalist id="cities">
    <option value="New York">
    <option value="Los Angeles">
    <option value="Chicago">
    <option value="Miami">
    <option value="Boston">
    <option value="Philadelphia">
    <option value="San Francisco">
    <option value="Denver">
    <option value="Seattle">
    <option value="Austin">
</datalist>
{% endblock %}
